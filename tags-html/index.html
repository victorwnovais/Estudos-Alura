<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags HTML</title>
</head>
<body>
    <H1></H1>
    <H2></H2>
    <H3></H3>

    <p>Esse é um parágrafo de texto em HTML, e não imrpota como eu escrevo, <br> por que ele sempre vai ser renderizado em uma única linha</p> 
    <p><b>Esse é um texto em negrito </b> usando uma tag não semântica </p>
    <p><em>Esse é um texto com ênfase,</em> usando uam tag não semântica</p>
    <p>Minha casa tem 80m<sup>2</sup></p>
    <p>a composição química da água é h<sub>2</sub>O</p>
</body>
</html>
